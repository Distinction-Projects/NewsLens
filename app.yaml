name: ml-sentiment
services:
  - name: web
    environment_slug: python
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    routes:
      - path: /
    github:
      repo: Distinction-Projects/ML_Sentiment
      branch: main
      deploy_on_push: true
    source_dir: .
    build_command: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python -m nltk.downloader stopwords punkt wordnet vader_lexicon punkt_tab &&
      python -m src.cache_models
    run_command: gunicorn --chdir src --timeout 600 app:server --bind 0.0.0.0:$PORT --worker-tmp-dir ${WORKER_TMP_DIR:-/tmp}
    envs:
      - key: PYTHON_VERSION
        value: "3.11"
        type: GENERAL
      - key: WORKER_TMP_DIR
        value: "/dev/shm"
        type: GENERAL
      - key: RSS_DAILY_JSON_URL
        value: "https://raw.githubusercontent.com/Distinction-Projects/RSS_Feeds/main/data/processed/rss_openai_precomputed.json"
        type: GENERAL
      - key: RSS_CACHE_TTL_SECONDS
        value: "86400"
        type: GENERAL
      - key: RSS_HTTP_TIMEOUT_SECONDS
        value: "20"
        type: GENERAL
      - key: RSS_MAX_AGE_SECONDS
        value: "129600"
        type: GENERAL
      - key: NEWS_FIGURE_CACHE_TTL_SECONDS
        value: "21600"
        type: GENERAL
      - key: NEWS_FIGURE_CACHE_MAX_ITEMS
        value: "128"
        type: GENERAL
      - key: NEWS_FIGURE_OUTPUT_FORMAT
        value: "png"
        type: GENERAL
