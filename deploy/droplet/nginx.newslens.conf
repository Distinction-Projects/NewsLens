map $http_x_forwarded_proto $newslens_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $newslens_forwarded_host {
    default $http_x_forwarded_host;
    "" $host;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $newslens_forwarded_proto;
        proxy_set_header X-Forwarded-Host $newslens_forwarded_host;
        proxy_read_timeout 600;
    }

    location /health/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $newslens_forwarded_proto;
        proxy_set_header X-Forwarded-Host $newslens_forwarded_host;
        proxy_read_timeout 600;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $newslens_forwarded_proto;
        proxy_set_header X-Forwarded-Host $newslens_forwarded_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600;
    }
}
