name: Deploy NewsLens Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: newslens-droplet-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HOST: ${{ secrets.DROPLET_HOST }}
      DEPLOY_USER: ${{ secrets.DROPLET_USER }}
      DEPLOY_PORT: ${{ secrets.DROPLET_PORT }}
      RSS_DAILY_JSON_URL: ${{ secrets.RSS_DAILY_JSON_URL }}
      RSS_HISTORY_JSON_URL_TEMPLATE: ${{ secrets.RSS_HISTORY_JSON_URL_TEMPLATE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DIRECT_DB_URL: ${{ secrets.SUPABASE_DIRECT_DB_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEWS_DATA_BACKEND: json
      NEWS_STATS_BACKEND: precomputed
      NEWS_STATS_SNAPSHOT_PATH: /srv/newslens/app/data/processed/news_analytics_snapshot.json
      NEWS_EVENT_EMBEDDINGS_ENABLED: true
      NEWS_EVENT_EMBEDDING_MODEL: text-embedding-3-small
      NEWS_EVENT_EMBEDDING_DIMENSIONS: 512
      NEWS_EVENT_SIMILARITY_THRESHOLD: 0.86
      NEWS_EVENT_DATE_WINDOW_DAYS: 3
      NEWS_EVENT_EMBEDDING_CACHE_PATH: /srv/newslens/app/data/cache/news_event_embeddings.sqlite
      NEWS_EVENT_EMBEDDING_BATCH_SIZE: 128
      NEWS_HTTP_CACHE_SECONDS: 300
      NEWS_STATS_HTTP_CACHE_SECONDS: 300
      NEWS_HTTP_STALE_SECONDS: 3600
      NEWS_SNAPSHOT_HTTP_CACHE_SECONDS: 86400
      NEWS_SNAPSHOT_HTTP_STALE_SECONDS: 604800
      NEXT_PUBLIC_NEWS_FETCH_REVALIDATE_SECONDS: 300
      NEXT_PUBLIC_NEWS_FETCH_TIMEOUT_MS: 20000
      NEXT_PUBLIC_SITE_URL: https://lab.spectralresidue.com
      RSS_SOURCE_EFFECT_PERMUTATIONS: 20
      RSS_CACHE_TTL_SECONDS: 21600
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add Droplet Host Key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync App To Droplet
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '.DS_Store' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            --exclude '.mypy_cache' \
            --exclude '.next' \
            --exclude 'test-results' \
            --exclude 'playwright-report' \
            --exclude '.tmp' \
            -e "ssh -p ${DEPLOY_PORT:-22}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/srv/newslens/app/"

      - name: Sync Runtime Env To Droplet
        run: |
          set -euo pipefail

          {
            printf 'RSS_DAILY_JSON_URL=%s\n' "${RSS_DAILY_JSON_URL}"
            printf 'RSS_HISTORY_JSON_URL_TEMPLATE=%s\n' "${RSS_HISTORY_JSON_URL_TEMPLATE}"
            printf 'NEWS_DATA_BACKEND=%s\n' "${NEWS_DATA_BACKEND:-json}"
            printf 'NEWS_STATS_BACKEND=%s\n' "${NEWS_STATS_BACKEND:-dynamic}"
            printf 'NEWS_STATS_SNAPSHOT_PATH=%s\n' "${NEWS_STATS_SNAPSHOT_PATH:-/srv/newslens/app/data/processed/news_analytics_snapshot.json}"
            printf 'NEWS_EVENT_EMBEDDINGS_ENABLED=%s\n' "${NEWS_EVENT_EMBEDDINGS_ENABLED:-true}"
            printf 'NEWS_EVENT_EMBEDDING_MODEL=%s\n' "${NEWS_EVENT_EMBEDDING_MODEL:-text-embedding-3-small}"
            printf 'NEWS_EVENT_EMBEDDING_DIMENSIONS=%s\n' "${NEWS_EVENT_EMBEDDING_DIMENSIONS:-512}"
            printf 'NEWS_EVENT_SIMILARITY_THRESHOLD=%s\n' "${NEWS_EVENT_SIMILARITY_THRESHOLD:-0.86}"
            printf 'NEWS_EVENT_DATE_WINDOW_DAYS=%s\n' "${NEWS_EVENT_DATE_WINDOW_DAYS:-3}"
            printf 'NEWS_EVENT_EMBEDDING_CACHE_PATH=%s\n' "${NEWS_EVENT_EMBEDDING_CACHE_PATH:-/srv/newslens/app/data/cache/news_event_embeddings.sqlite}"
            printf 'NEWS_EVENT_EMBEDDING_BATCH_SIZE=%s\n' "${NEWS_EVENT_EMBEDDING_BATCH_SIZE:-128}"
            printf 'NEWS_HTTP_CACHE_SECONDS=%s\n' "${NEWS_HTTP_CACHE_SECONDS:-300}"
            printf 'NEWS_STATS_HTTP_CACHE_SECONDS=%s\n' "${NEWS_STATS_HTTP_CACHE_SECONDS:-300}"
            printf 'NEWS_HTTP_STALE_SECONDS=%s\n' "${NEWS_HTTP_STALE_SECONDS:-3600}"
            printf 'NEWS_SNAPSHOT_HTTP_CACHE_SECONDS=%s\n' "${NEWS_SNAPSHOT_HTTP_CACHE_SECONDS:-86400}"
            printf 'NEWS_SNAPSHOT_HTTP_STALE_SECONDS=%s\n' "${NEWS_SNAPSHOT_HTTP_STALE_SECONDS:-604800}"
            printf 'NEXT_PUBLIC_NEWS_FETCH_REVALIDATE_SECONDS=%s\n' "${NEXT_PUBLIC_NEWS_FETCH_REVALIDATE_SECONDS:-300}"
            printf 'NEXT_PUBLIC_NEWS_FETCH_TIMEOUT_MS=%s\n' "${NEXT_PUBLIC_NEWS_FETCH_TIMEOUT_MS:-20000}"
            printf 'NEXT_PUBLIC_SITE_URL=%s\n' "${NEXT_PUBLIC_SITE_URL:-https://lab.spectralresidue.com}"
            printf 'RSS_SOURCE_EFFECT_PERMUTATIONS=%s\n' "${RSS_SOURCE_EFFECT_PERMUTATIONS:-20}"
            printf 'RSS_CACHE_TTL_SECONDS=%s\n' "${RSS_CACHE_TTL_SECONDS:-21600}"
            if [ -n "${DATABASE_URL:-}" ]; then
              printf 'DATABASE_URL=%s\n' "${DATABASE_URL}"
            fi
            if [ -n "${SUPABASE_DIRECT_DB_URL:-}" ]; then
              printf 'SUPABASE_DIRECT_DB_URL=%s\n' "${SUPABASE_DIRECT_DB_URL}"
            fi
            if [ -n "${OPENAI_API_KEY:-}" ]; then
              printf 'OPENAI_API_KEY=%s\n' "${OPENAI_API_KEY}"
            fi
          } > /tmp/newslens.env

          scp -P "${DEPLOY_PORT:-22}" /tmp/newslens.env "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/newslens.env"
          rm -f /tmp/newslens.env

          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" << 'EOF'
          set -euo pipefail
          set -x

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          fi

          ${SUDO} install -m 640 -o root -g newslens /tmp/newslens.env /etc/newslens/newslens.env
          rm -f /tmp/newslens.env
          EOF

      - name: Build Services And Smoke Check
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" << 'EOF'
          set -euo pipefail

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          fi

          run_as_app_user() {
            if [ "$(id -u)" -eq 0 ]; then
              runuser -u newslens -- "$@"
            else
              sudo -u newslens "$@"
            fi
          }

          run_as_app_user_timeout() {
            seconds="$1"
            shift
            if [ "$(id -u)" -eq 0 ]; then
              runuser -u newslens -- timeout "$seconds" "$@"
            else
              sudo -u newslens timeout "$seconds" "$@"
            fi
          }

          cd /srv/newslens/app

          if ! command -v node >/dev/null 2>&1 || ! node -e 'process.exit(Number(process.versions.node.split(".")[0]) >= 20 ? 0 : 1)' >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            else
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            fi
            ${SUDO} apt-get install -y nodejs
          fi

          ${SUDO} chown -R newslens:newslens /srv/newslens/app
          timeout 600 /srv/newslens/venv/bin/pip install -r /srv/newslens/app/requirements.txt

          DATA_BACKEND="$(grep -E '^NEWS_DATA_BACKEND=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
          DATA_BACKEND="${DATA_BACKEND:-json}"

          if [ "$DATA_BACKEND" = "postgres" ] && grep -Eq '^(DATABASE_URL|SUPABASE_DIRECT_DB_URL)=' /etc/newslens/newslens.env; then
            ${SUDO} apt-get update
            ${SUDO} apt-get install -y postgresql-client

            DB_URL="$(grep -E '^(DATABASE_URL|SUPABASE_DIRECT_DB_URL)=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
            for migration in /srv/newslens/app/supabase/migrations/*.sql; do
              [ -f "$migration" ] || continue
              run_as_app_user psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$migration"
            done

            RSS_URL="$(grep -E '^RSS_DAILY_JSON_URL=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
            RSS_HISTORY_TEMPLATE="$(grep -E '^RSS_HISTORY_JSON_URL_TEMPLATE=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
            run_as_app_user env DATABASE_URL="$DB_URL" RSS_DAILY_JSON_URL="$RSS_URL" RSS_HISTORY_JSON_URL_TEMPLATE="$RSS_HISTORY_TEMPLATE" \
              /srv/newslens/venv/bin/python -m src.ingest.rss_to_postgres --source current --refresh-derived
          else
            echo "Skipping Postgres migration/import for NEWS_DATA_BACKEND=${DATA_BACKEND}."
          fi

          RSS_URL="$(grep -E '^RSS_DAILY_JSON_URL=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
          RSS_HISTORY_TEMPLATE="$(grep -E '^RSS_HISTORY_JSON_URL_TEMPLATE=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
          STATS_SNAPSHOT_PATH="$(grep -E '^NEWS_STATS_SNAPSHOT_PATH=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)"
          STATS_SNAPSHOT_PATH="${STATS_SNAPSHOT_PATH:-/srv/newslens/app/data/processed/news_analytics_snapshot.json}"
          ${SUDO} install -d -m 775 -o newslens -g newslens "$(dirname "$STATS_SNAPSHOT_PATH")"
          run_as_app_user_timeout 900 env \
            NEWS_STATS_BACKEND=dynamic \
            NEWS_DATA_BACKEND="$DATA_BACKEND" \
            RSS_DAILY_JSON_URL="$RSS_URL" \
            RSS_HISTORY_JSON_URL_TEMPLATE="$RSS_HISTORY_TEMPLATE" \
            OPENAI_API_KEY="$(grep -E '^OPENAI_API_KEY=' /etc/newslens/newslens.env | head -1 | cut -d= -f2- || true)" \
            NEWS_EVENT_EMBEDDINGS_ENABLED="$(grep -E '^NEWS_EVENT_EMBEDDINGS_ENABLED=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEWS_EVENT_EMBEDDING_MODEL="$(grep -E '^NEWS_EVENT_EMBEDDING_MODEL=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEWS_EVENT_EMBEDDING_DIMENSIONS="$(grep -E '^NEWS_EVENT_EMBEDDING_DIMENSIONS=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEWS_EVENT_SIMILARITY_THRESHOLD="$(grep -E '^NEWS_EVENT_SIMILARITY_THRESHOLD=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEWS_EVENT_DATE_WINDOW_DAYS="$(grep -E '^NEWS_EVENT_DATE_WINDOW_DAYS=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEWS_EVENT_EMBEDDING_CACHE_PATH="$(grep -E '^NEWS_EVENT_EMBEDDING_CACHE_PATH=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEWS_EVENT_EMBEDDING_BATCH_SIZE="$(grep -E '^NEWS_EVENT_EMBEDDING_BATCH_SIZE=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            RSS_SOURCE_EFFECT_PERMUTATIONS="$(grep -E '^RSS_SOURCE_EFFECT_PERMUTATIONS=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            RSS_CACHE_TTL_SECONDS="$(grep -E '^RSS_CACHE_TTL_SECONDS=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            /srv/newslens/venv/bin/python -m src.analytics.build_news_snapshot --output "$STATS_SNAPSHOT_PATH"

          ${SUDO} install -m 644 /srv/newslens/app/deploy/droplet/newslens-api.service /etc/systemd/system/newslens-api.service
          ${SUDO} systemctl daemon-reload
          ${SUDO} systemctl disable --now newslens 2>/dev/null || true
          ${SUDO} systemctl enable newslens-api
          ${SUDO} systemctl kill --kill-who=all newslens-api 2>/dev/null || true
          ${SUDO} systemctl reset-failed newslens-api 2>/dev/null || true
          timeout 60 ${SUDO} systemctl restart newslens-api
          ${SUDO} systemctl is-active --quiet newslens-api

          # Avoid OOM kills during Next.js production build on small droplets.
          if ! swapon --show | grep -q .; then
            ${SUDO} fallocate -l 2G /swapfile || ${SUDO} dd if=/dev/zero of=/swapfile bs=1M count=2048
            ${SUDO} chmod 600 /swapfile
            ${SUDO} mkswap /swapfile
            ${SUDO} swapon /swapfile
          fi

          run_as_app_user_timeout 600 npm --prefix /srv/newslens/app/frontend-node ci
          run_as_app_user_timeout 120 npm --prefix /srv/newslens/app/frontend-node run check:news-renderers
          run_as_app_user_timeout 900 env NEXT_PUBLIC_NEWS_API_BASE_URL=http://127.0.0.1:9000 \
            NEXT_PUBLIC_NEWS_FETCH_REVALIDATE_SECONDS="$(grep -E '^NEXT_PUBLIC_NEWS_FETCH_REVALIDATE_SECONDS=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEXT_PUBLIC_NEWS_FETCH_TIMEOUT_MS="$(grep -E '^NEXT_PUBLIC_NEWS_FETCH_TIMEOUT_MS=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NEXT_PUBLIC_SITE_URL="$(grep -E '^NEXT_PUBLIC_SITE_URL=' /etc/newslens/newslens.env | head -1 | cut -d= -f2-)" \
            NODE_OPTIONS=--max-old-space-size=1024 \
            npm --prefix /srv/newslens/app/frontend-node run build

          ${SUDO} install -m 644 /srv/newslens/app/deploy/droplet/newslens-node.service /etc/systemd/system/newslens-node.service
          ${SUDO} systemctl daemon-reload
          ${SUDO} systemctl enable newslens-api newslens-node

          ${SUDO} systemctl kill --kill-who=all newslens-api 2>/dev/null || true
          ${SUDO} systemctl reset-failed newslens-api 2>/dev/null || true
          timeout 60 ${SUDO} systemctl restart newslens-api
          timeout 60 ${SUDO} systemctl restart newslens-node
          ${SUDO} systemctl is-active --quiet newslens-api
          ${SUDO} systemctl is-active --quiet newslens-node

          # Stats should be ready from the precomputed snapshot. Retry startup
          # separately so a transient connection refusal after restart does not
          # fail an otherwise healthy deploy.
          warm_ok=0
          for i in $(seq 1 24); do
            if curl -fsS --connect-timeout 3 --max-time 180 http://127.0.0.1:9000/api/news/stats >/dev/null; then
              warm_ok=1
              break
            fi
            sleep 5
          done
          if [ "$warm_ok" -ne 1 ]; then
            ${SUDO} systemctl status newslens-api --no-pager || true
            ${SUDO} journalctl -u newslens-api -n 120 --no-pager || true
            exit 1
          fi

          api_ok=0
          for i in $(seq 1 36); do
            if curl -fsS --connect-timeout 3 --max-time 120 http://127.0.0.1:9000/api/news/stats >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 120 http://127.0.0.1:9000/api/news/digest?limit=1 >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 120 'http://127.0.0.1:9000/api/news/export?artifact=event_control_summary&format=json' >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 20 http://127.0.0.1:9000/health/database >/dev/null; then
              api_ok=1
              break
            fi
            sleep 5
          done

          stats_contract_ok=0
          for i in $(seq 1 12); do
            if /srv/newslens/venv/bin/python - << 'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:9000/api/news/stats", timeout=120) as response:
              payload = json.loads(response.read().decode("utf-8"))

          derived = payload.get("data", {}).get("derived", {})
          required = ["source_topic_control", "tag_sliced_analysis", "event_control"]
          missing = [key for key in required if not isinstance(derived.get(key), dict)]
          if missing:
              raise SystemExit(f"missing derived fields: {missing}")
          PY
            then
              stats_contract_ok=1
              break
            fi
            sleep 5
          done

          node_ok=0
          for i in $(seq 1 36); do
            if curl -fsS --connect-timeout 3 --max-time 20 http://127.0.0.1:3000/ >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 20 http://127.0.0.1:3000/evaluation >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 90 http://127.0.0.1:3000/news/digest >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 90 http://127.0.0.1:3000/news/event-control >/dev/null; then
              node_ok=1
              break
            fi
            sleep 5
          done

          if [ "$api_ok" -ne 1 ] || [ "$stats_contract_ok" -ne 1 ] || [ "$node_ok" -ne 1 ]; then
            ${SUDO} systemctl status newslens-api --no-pager || true
            ${SUDO} systemctl status newslens-node --no-pager || true
            ${SUDO} journalctl -u newslens-api -n 120 --no-pager || true
            ${SUDO} journalctl -u newslens-node -n 120 --no-pager || true
            exit 1
          fi

          ${SUDO} install -m 644 /srv/newslens/app/deploy/droplet/nginx.newslens.conf /etc/nginx/sites-available/newslens
          ${SUDO} ln -sf /etc/nginx/sites-available/newslens /etc/nginx/sites-enabled/newslens
          ${SUDO} rm -f /etc/nginx/sites-enabled/default
          ${SUDO} nginx -t
          ${SUDO} systemctl restart nginx

          nginx_ok=0
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 3 --max-time 30 http://127.0.0.1/ >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 30 http://127.0.0.1/evaluation >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 90 http://127.0.0.1/news/digest >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 90 http://127.0.0.1/news/event-control >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 120 http://127.0.0.1/api/news/stats >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 120 http://127.0.0.1/api/news/digest?limit=1 >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 120 'http://127.0.0.1/api/news/export?artifact=event_control_summary&format=json' >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 20 http://127.0.0.1/health/database >/dev/null; then
              nginx_ok=1
              break
            fi
            sleep 5
          done

          if [ "$nginx_ok" -eq 1 ]; then
            exit 0
          fi

          ${SUDO} systemctl status nginx --no-pager || true
          ${SUDO} journalctl -u nginx -n 120 --no-pager || true
          exit 1
          EOF
